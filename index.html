<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルーレット &amp; 配役シャッフル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* ホワイトベースのカラーパレットに修正 */
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface2: #F1F5F9;
      --border: #E2E8F0;
      --border-h: #000103;
      --accent: #8B5CF6;
      --accent-dim: rgba(139, 92, 246, 0.1);
      --accent-light: #A78BFA;
      --text: #1E293B;
      --muted: #64748B;
      --dim: #94A3B8;
      --danger: #EF4444;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────── */
    header {
      background: var(--surface);
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      gap: 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 0;
      margin-right: 24px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 26px;
      height: 26px;
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .logo em {
      color: var(--accent);
      font-style: normal;
    }

    /* tabs */
    .tabs {
      display: flex;
      align-items: stretch;
      gap: 2px;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .tab-btn .tab-icon {
      font-size: 15px;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── PAGES ──────────────────────────── */
    main {
      flex: 1;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* ══════════════════════════════════════
   ROULETTE PAGE
══════════════════════════════════════ */
    .roulette-layout {
      display: flex;
      gap: 32px;
      padding: 32px 28px;
      max-width: 1060px;
      margin: 0 auto;
      width: 100%;
    }

    .wheel-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      min-width: 0;
    }

    .wheel-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.05));
    }

    #wheel {
      display: block;
      border-radius: 50%;
    }

    .pointer-wrap {
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    .pointer {
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-right: 22px solid var(--accent);
    }

    .pointer-stem {
      width: 10px;
      height: 4px;
      background: var(--accent);
      border-radius: 2px;
    }

    .result-area {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 400px;
    }

    .result-badge {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      width: 100%;
      word-break: break-word;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .spin-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 15px 52px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px 0 var(--accent-dim);
    }

    .spin-btn:hover:not(:disabled) {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px 0 var(--accent-dim);
    }

    .spin-btn:active:not(:disabled) {
      transform: none;
    }

    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* roulette sidebar */
    .r-sidebar {
      width: 300px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ══════════════════════════════════════
   CASTING PAGE
══════════════════════════════════════ */
    .casting-layout {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .casting-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      background: var(--surface);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .casting-inputs {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: start;
    }

    .cast-col-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cast-count {
      font-size: 11px;
      background: var(--surface2);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 99px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    .casting-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 40px;
      color: var(--dim);
      font-size: 20px;
    }

    .cast-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 12px 14px;
      outline: none;
      resize: none;
      height: 220px;
      line-height: 1.7;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: block;
    }

    .cast-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .cast-textarea::placeholder {
      color: var(--dim);
    }

    .role-quick,
    .player-quick {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cast-btn-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .cast-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 15px 40px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 14px 0 var(--accent-dim);
    }

    .cast-btn:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px 0 var(--accent-dim);
    }

    .cast-btn:active {
      transform: none;
    }

    .cast-warn {
      font-size: 13px;
      color: #D97706;
      background: #FEF3C7;
      padding: 8px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    /* Result */
    .cast-result {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .cast-card {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: slideIn 0.3s ease both;
      animation-delay: var(--delay, 0ms);
    }

    @keyframes slideIn {
      from {
        transform: translateY(10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .cast-player {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      word-break: break-word;
      color: var(--text);
    }

    .cast-sep {
      padding: 14px 4px;
      color: var(--dim);
      font-size: 14px;
      flex-shrink: 0;
    }

    .cast-role {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      word-break: break-word;
      text-align: right;
    }

    /* ── SHARED COMPONENTS ──────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .item-count {
      font-size: 11px;
      background: var(--surface2);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 99px;
      font-weight: 600;
    }

    .items-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      padding: 12px 14px;
      outline: none;
      resize: none;
      height: 180px;
      line-height: 1.7;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: block;
      margin-bottom: 14px;
    }

    .items-textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .items-textarea::placeholder {
      color: var(--dim);
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .quick-add,
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .qa-btn,
    .preset-btn,
    .rq-btn,
    .pq-btn {
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      padding: 6px 12px;
      font-family: inherit;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .qa-btn:hover,
    .rq-btn:hover,
    .pq-btn:hover {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .preset-btn {
      color: var(--muted);
      background: var(--surface2);
      border-color: transparent;
    }

    .preset-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text);
      padding: 6px 0;
      border-bottom: 1px solid var(--surface2);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .hist-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hist-num {
      font-size: 12px;
      color: var(--muted);
      min-width: 18px;
      text-align: right;
      font-weight: 500;
    }

    .empty-msg {
      font-size: 13px;
      color: var(--dim);
      text-align: center;
      padding: 16px 0;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }

    .clear-btn:hover {
      color: var(--danger);
      background: #FEE2E2;
    }

    @keyframes pop {
      from {
        transform: scale(0.9);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    footer {
      text-align: center;
      padding: 24px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    /* スクロールバーのカスタマイズ */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-h);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* ── RESPONSIVE ─────────────────────── */
    @media (max-width: 700px) {
      header {
        padding: 0 16px;
      }

      .logo {
        font-size: 15px;
        margin-right: 12px;
      }

      .tab-btn {
        font-size: 13px;
        padding: 0 12px;
      }

      .roulette-layout {
        flex-direction: column;
        align-items: center;
        padding: 24px 16px;
        gap: 24px;
      }

      .r-sidebar {
        width: 100%;
        max-width: 420px;
      }

      .casting-layout {
        padding: 24px 16px;
      }

      .casting-inputs {
        grid-template-columns: 1fr;
      }

      .casting-arrow {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <em>ルーレット</em>
    </div>
    <div class="tabs">
      <button class="tab-btn" data-tab="roulette" onclick="switchTab('roulette')">
        <span class="tab-icon">🎡</span> ルーレット
      </button>
      <button class="tab-btn active" data-tab="casting" onclick="switchTab('casting')">
        <span class="tab-icon">🎭</span> 配役シャッフル
      </button>
    </div>
  </header>

  <main>

    <div class="page" id="page-roulette">
      <div class="roulette-layout">
        <div class="wheel-section">
          <div class="wheel-container" id="wheelContainer">
            <canvas id="wheel"></canvas>
            <div class="pointer-wrap">
              <div class="pointer-stem"></div>
              <div class="pointer"></div>
            </div>
          </div>
          <div class="result-area" id="resultArea"></div>
          <button class="spin-btn" id="spinBtn" onclick="spin()">スピン</button>
        </div>

        <div class="r-sidebar">
          <div class="card">
            <div class="card-header">
              <div class="card-title">選択肢</div>
              <span class="item-count" id="itemCount">0</span>
            </div>
            <textarea class="items-textarea" id="itemsTextarea" placeholder="選択肢を1行ずつ入力&#10;例：&#10;ラーメン&#10;カレー&#10;パスタ"
              spellcheck="false"></textarea>

            <div class="section-label">クイック追加</div>
            <div class="quick-add" id="quickAdd"></div>

            <div class="section-label">プリセット（全置き換え）</div>
            <div class="presets">
              <button class="preset-btn" onclick="loadPreset('yn')">はい / いいえ</button>
              <button class="preset-btn" onclick="loadPreset('week')">曜日</button>
              <button class="preset-btn" onclick="loadPreset('num')">1〜6</button>
              <button class="preset-btn" onclick="loadPreset('default')">サンプル</button>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">結果履歴</div>
              <button class="clear-btn" onclick="clearHistory()">クリア</button>
            </div>
            <div class="history-list" id="historyList">
              <div class="empty-msg">まだ結果がありません</div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="page active" id="page-casting">
      <div class="casting-layout">

        <p class="casting-desc">
          プレイヤー名と役職名をそれぞれ1行ずつ入力して「シャッフル！」を押すと、ランダムに割り当てを行います。<br>
          行数が異なる場合は少ない方に合わせます。
        </p>

        <div class="casting-inputs">
          <div>
            <div class="cast-col-label">
              プレイヤー
              <span class="cast-count" id="playerCount">0人</span>
            </div>
            <textarea class="cast-textarea" id="playersTA" placeholder="田中&#10;山田&#10;鈴木&#10;佐藤"
              spellcheck="false"></textarea>
            <div class="player-quick" id="playerQuick"></div>
          </div>


          <div class="casting-arrow">→</div>

          <div>
            <div class="cast-col-label">
              役職
              <span class="cast-count" id="roleCount">0役職</span>
            </div>
            <textarea class="cast-textarea" id="rolesTA" placeholder="村人&#10;人狼&#10;予言者&#10;騎士"
              spellcheck="false"></textarea>
            <div class="role-quick" id="roleQuick"></div>
          </div>
        </div>

        <div class="cast-btn-row">
          <button class="cast-btn" onclick="doCasting()">🎭 シャッフル！</button>
          <div class="cast-warn" id="castWarn" style="display:none">
            ⚠ 行数が一致しません
          </div>
        </div>

        <div class="cast-result" id="castResult"></div>

      </div>
    </div>

  </main>

  <footer>1行ごとに1つの選択肢 &nbsp;·&nbsp; 最低2項目必要です（ルーレット）</footer>

  <script>
    /* ══════════════════════════════
       SHARED
    ══════════════════════════════ */
    const COLORS = [
      '#FF6B6B', '#FF9F43', '#FECA57', '#1DD1A1',
      '#48DBFB', '#54A0FF', '#C44EE0', '#FF9FF3',
      '#FF6348', '#0ABDE3', '#10AC84', '#EE5A24'
    ];

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function getLines(ta) {
      return ta.value.split('\n').map(l => l.trim()).filter(Boolean);
    }

    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(p =>
        p.classList.toggle('active', p.id === 'page-' + tab));
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === tab));
    }

    /* ══════════════════════════════
       ROULETTE
    ══════════════════════════════ */
    const PRESETS = {
      default: ['選択肢 A', '選択肢 B', '選択肢 C', '選択肢 D', '選択肢 E', '選択肢 F'],
      yn: ['はい', 'いいえ'],
      week: ['月曜', '火曜', '水曜', '木曜', '金曜', '土曜', '日曜'],
      num: ['1', '2', '3', '4', '5', '6']
    };

    const QUICK_LABELS = [
      'はい', 'いいえ', 'たぶん', 'A', 'B', 'C', 'D', 'E', 'F',
      '○', '△', '×', '1', '2', '3', '4', '5', '6'
    ];

    let rItems = [...PRESETS.default];
    let rAngle = 0;
    let spinning = false;
    let history = [];
    let audioCtx = null;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const textarea = document.getElementById('itemsTextarea');
    let SIZE = 380;

    function parseTextarea() {
      rItems = getLines(textarea);
      document.getElementById('itemCount').textContent = rItems.length;
      drawWheel();
    }

    function setTextarea(arr) {
      textarea.value = arr.join('\n');
      parseTextarea();
    }

    textarea.addEventListener('input', parseTextarea);

    function appendQuick(label) {
      const v = textarea.value;
      const needNL = v.length > 0 && !v.endsWith('\n');
      textarea.value = (needNL ? v + '\n' : v) + label + '\n';
      parseTextarea();
      textarea.focus();
      textarea.scrollTop = textarea.scrollHeight;
    }

    function buildQuickAdd() {
      const wrap = document.getElementById('quickAdd');
      QUICK_LABELS.forEach(lbl => {
        const btn = document.createElement('button');
        btn.className = 'qa-btn';
        btn.textContent = lbl;
        btn.addEventListener('click', () => appendQuick(lbl));
        wrap.appendChild(btn);
      });
    }

    function setSize() {
      const wrap = document.getElementById('wheelContainer');

      // 親要素の横幅から余白を引いた、表示可能な最大幅を計算（最大値を 500 に引き上げ）
      const avail = Math.min(wrap.parentElement.offsetWidth - 16, 500);
      SIZE = Math.max(280, avail);

      // 画面のピクセル密度（DPI）を取得
      const dpr = window.devicePixelRatio || 1;

      // 1. Canvasの「ブラウザ上の見た目のサイズ（CSS）」をしっかり固定
      canvas.style.width = SIZE + 'px';
      canvas.style.height = SIZE + 'px';

      // 2. Canvasの「内部の解像度（画素数）」をDPI倍にして高画質化
      canvas.width = SIZE * dpr;
      canvas.height = SIZE * dpr;

      // 3. 描画コンテキストのスケールをリセットしてから再設定
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);

      drawWheel();
    }

    function drawWheel() {
      const cx = SIZE / 2, cy = SIZE / 2, r = cx - 6;
      const n = rItems.length;
      ctx.clearRect(0, 0, SIZE, SIZE);

      if (!n) {
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        ctx.fillStyle = '#E2E8F0'; /* 空の時の色もライトに変更 */
        ctx.fill();
        ctx.fillStyle = '#64748B'; ctx.textAlign = 'center';
        ctx.font = '14px Inter,sans-serif';
        ctx.fillText('項目を追加してください', cx, cy);
        return;
      }

      const arc = 2 * Math.PI / n;
      const fs = Math.max(12, Math.min(18, Math.floor(200 / n)));
      const mc = Math.max(4, Math.floor(12 - n * 0.5));

      rItems.forEach((item, i) => {
        const s = rAngle + i * arc, e = s + arc;
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, s, e); ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
        ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2.5; ctx.stroke();

        ctx.save(); ctx.translate(cx, cy); ctx.rotate(s + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#FFFFFF';
        ctx.font = `700 ${fs}px Inter,system-ui,sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4;
        const label = item.length > mc ? item.slice(0, mc - 1) + '…' : item;
        ctx.fillText(label, r - 18, fs * 0.35);
        ctx.restore();
      });

      // 中央の装飾（ライトテーマ合わせ）
      ctx.beginPath(); ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
      ctx.fillStyle = '#FFFFFF'; ctx.fill();
      ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 4; ctx.fill(); // 簡単なドロップシャドウ

      ctx.beginPath(); ctx.arc(cx, cy, 8, 0, 2 * Math.PI);
      ctx.fillStyle = '#8B5CF6'; ctx.fill();
    }

    function getWinner() {
      if (!rItems.length) return null;
      const arc = 2 * Math.PI / rItems.length;
      const norm = ((-rAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
      const idx = Math.floor(norm / arc) % rItems.length;
      return { item: rItems[idx], idx };
    }

    function playTick() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 600 + Math.random() * 300; osc.type = 'triangle';
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
      } catch (_) { }
    }

    function spin() {
      if (spinning || rItems.length < 2) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('resultArea').innerHTML = '';

      const total = (5 + Math.random() * 6) * 2 * Math.PI + Math.random() * 2 * Math.PI;
      const start = rAngle, target = start + total;
      const dur = 500 + Math.random() * 600, t0 = performance.now();
      const sa = 2 * Math.PI / rItems.length;
      let lastSeg = Math.floor((rAngle % (2 * Math.PI)) / sa);

      function frame(now) {
        const t = Math.min((now - t0) / dur, 1);
        const e = 1 - Math.pow(1 - t, 4);
        rAngle = start + (target - start) * e;
        const cs = Math.floor((rAngle % (2 * Math.PI)) / sa);
        if (cs !== lastSeg && t < 0.92) { playTick(); lastSeg = cs; }
        drawWheel();
        if (t < 1) { requestAnimationFrame(frame); return; }
        rAngle = target; spinning = false;
        document.getElementById('spinBtn').disabled = false;
        const w = getWinner(); if (w) showResult(w);
      }
      requestAnimationFrame(frame);
    }

    function showResult(w) {
      const color = COLORS[w.idx % COLORS.length];
      document.getElementById('resultArea').innerHTML =
        `<div class="result-badge" style="background:${color}15;border:2px solid ${color};color:${color};">
       🎉 ${esc(w.item)}</div>`;
      history.unshift({ item: w.item, color });
      if (history.length > 30) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('historyList');
      if (!history.length) { list.innerHTML = '<div class="empty-msg">まだ結果がありません</div>'; return; }
      list.innerHTML = history.map((h, i) =>
        `<div class="history-item">
       <span class="hist-num">${i + 1}</span>
       <div class="hist-dot" style="background:${h.color}"></div>
       <span>${esc(h.item)}</span>
     </div>`).join('');
    }

    function clearHistory() { history = []; renderHistory(); }

    function loadPreset(k) {
      rAngle = 0;
      document.getElementById('resultArea').innerHTML = '';
      setTextarea(PRESETS[k]);
    }

    /* ══════════════════════════════
       CASTING
    ══════════════════════════════ */
    const ROLE_QUICK = [
      '村人', '人狼', '狂人', '予言者', '霊媒師',
      '騎士', 'ボディーガード', '妖狐', '市民', '裏切り者', '狩人'
    ];

    const playersTA = document.getElementById('playersTA');
    const rolesTA = document.getElementById('rolesTA');

    function updateCastCounts() {
      const p = getLines(playersTA).length;
      const r = getLines(rolesTA).length;
      document.getElementById('playerCount').textContent = p + '人';
      document.getElementById('roleCount').textContent = r + '役職';
      const warn = document.getElementById('castWarn');
      warn.style.display = (p > 0 && r > 0 && p !== r) ? 'flex' : 'none';
    }

    playersTA.addEventListener('input', updateCastCounts);
    rolesTA.addEventListener('input', updateCastCounts);

    function appendRole(label) {
      const v = rolesTA.value;
      const needNL = v.length > 0 && !v.endsWith('\n');
      rolesTA.value = (needNL ? v + '\n' : v) + label + '\n';
      updateCastCounts();
      rolesTA.scrollTop = rolesTA.scrollHeight;
    }

    function buildRoleQuick() {
      const wrap = document.getElementById('roleQuick');
      ROLE_QUICK.forEach(lbl => {
        const btn = document.createElement('button');
        btn.className = 'rq-btn';
        btn.textContent = lbl;
        btn.addEventListener('click', () => appendRole(lbl));
        wrap.appendChild(btn);
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function doCasting() {
      const players = getLines(playersTA);
      const roles = getLines(rolesTA);
      const result = document.getElementById('castResult');

      if (!players.length || !roles.length) {
        result.innerHTML = '<div class="empty-msg">プレイヤーと役職を入力してください</div>';
        return;
      }

      const count = Math.min(players.length, roles.length);
      const shuffled = shuffle(roles);
      result.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const color = COLORS[i % COLORS.length];
        const card = document.createElement('div');
        card.className = 'cast-card';
        card.style.setProperty('--delay', `${i * 60}ms`);
        card.style.borderLeft = `4px solid ${color}`;
        card.innerHTML =
          `<span class="cast-player">${esc(players[i])}</span>
       <span class="cast-sep">→</span>
       <span class="cast-role" style="color:${color}">${esc(shuffled[i])}</span>`;
        result.appendChild(card);
      }
    }

    function buildPlayerQuick() {
      const wrap = document.getElementById('playerQuick');
      for (let i = 3; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.className = 'pq-btn';
        btn.textContent = i + '人';
        btn.addEventListener('click', () => {
          // 1からiまでの数字を改行区切りで生成
          const lines = [];
          for (let j = 1; j <= i; j++) {
            lines.push(j);
          }
          // テキストエリアにセットしてカウントを更新
          playersTA.value = lines.join('\n');
          updateCastCounts();
        });
        wrap.appendChild(btn);
      }
    }
    /* ── INIT ── */
    window.addEventListener('resize', () => { clearTimeout(window._rsz); window._rsz = setTimeout(setSize, 80); });
    buildQuickAdd();
    buildRoleQuick();
    buildPlayerQuick();
    updateCastCounts();
    setTextarea(PRESETS.default);
    setSize();
    renderHistory();
  </script>
</body>

</html>
